<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMLY — Игровая Платформа</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>

    <header>
        <div class="logo">GMLY</div>
        <div class="subtitle">настольные игры</div>
    </header>

    <main class="games-grid">
        <button class="game-card" onclick="startGame('Шахматы')">
            <span class="game-icon">♞</span>
            <span class="game-title">Шахматы</span>
        </button>
        
        <button class="game-card" onclick="startGame('Карты')">
            <span class="game-icon">♣</span>
            <span class="game-title">Карты</span>
        </button>

        <button class="game-card" onclick="startGame('Мафия')">
            <span class="game-icon">👁</span>
            <span class="game-title">Мафия</span>
        </button>

        <button class="game-card" onclick="startGame('Морской Бой')">
            <span class="game-icon">⚓</span>
            <span class="game-title">Морской Бой</span>
        </button>
    </main>

    <footer class="user-info" id="user-display">
        Подключение к Telegram...
    </footer>

    <script src="../scripts/main.js"></script>
</body>
</html>
